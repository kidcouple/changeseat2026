services:
  - type: web
    name: seat-arrangement
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
    autoDeploy: true
    plan: free
    healthCheckPath: /
    disk:
      name: tmp
      mountPath: /tmp
      sizeGB: 1 